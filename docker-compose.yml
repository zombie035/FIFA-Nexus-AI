# FIFA Nexus AI – Docker Compose Orchestration
# Manages 4 services: postgres, redis, api (FastAPI), web (Next.js)
# Usage: docker-compose up --build

name: fifa-nexus-ai

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fifa_user
      POSTGRES_PASSWORD: fifa_password
      POSTGRES_DB: fifa_nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fifa_user -d fifa_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis Cache & Message Broker ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend + AI Copilot ──────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fifa_user:fifa_password@postgres:5432/fifa_nexus
      - REDIS_URL=redis://redis:6379/0
      # Gemini AI Key — set in .env file at project root (never hardcode!)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - api

# ─── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
