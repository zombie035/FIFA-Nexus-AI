# FIFA Nexus AI – Docker Compose Orchestration
# Usage: docker compose up --build
# Then open http://localhost:3000

name: fifa-nexus-ai

services:
  # ─── FastAPI Backend + AI Copilot ──────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Gemini AI Key — set in .env file at project root (never hardcode!)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_ vars are baked into the JS bundle at build time.
        # In Docker, the browser accesses the API via the HOST machine (localhost),
        # not the internal Docker network.
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
